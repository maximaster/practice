<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recall</title>
  </head>
  <body>
    <main id="app">
      <h1>Recall</h1>

      <p id="status" role="status" aria-live="polite"></p>

      <section id="stats" aria-label="Статистика">
        <span data-stat="due_today">сегодня: …</span>
        <span data-stat="due_week">за неделю: …</span>
        <span data-stat="streak">серия: …</span>
      </section>

      <section aria-label="Заметки">
        <h2>Заметки</h2>
        <form id="note-form">
          <input
            name="title"
            placeholder="Заголовок"
            aria-label="Заголовок заметки"
            required
          />
          <input
            name="tags"
            placeholder="теги через запятую"
            aria-label="Теги через запятую"
          />
          <textarea
            name="body"
            placeholder="Текст заметки"
            aria-label="Текст заметки"
          ></textarea>
          <button type="submit">Добавить заметку</button>
        </form>
        <ul id="note-list"></ul>
      </section>

      <section aria-label="Повторение">
        <h2>Очередь повторения</h2>
        <div id="queue"></div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
